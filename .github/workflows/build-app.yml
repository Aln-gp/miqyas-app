name: Build Najd OS

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Clean and Force NuGet Sources
      shell: powershell
      run: |
        # حذف أي ملف إعدادات قديم أو مخفي قد يسبب تضارب في الحزم
        if (Test-Path "nuget.config") { Remove-Item "nuget.config" -Force }
        if (Test-Path "NajdOS/nuget.config") { Remove-Item "NajdOS/nuget.config" -Force }
        
        # إنشاء ملف إعدادات جديد ونظيف ومضمون مية بالمية
        $config = @"
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <packageSources>
            <clear />
            <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
            <add key="Cosmos" value="https://www.myget.org/F/cosmos/api/v3/index.json" />
          </packageSources>
        </configuration>
        "@
        Set-Content -Path "nuget.config" -Value $config

    - name: Build Najd OS Solution
      run: |
        dotnet restore NajdOS.sln --configfile nuget.config
        dotnet build NajdOS.sln --configuration Release

    - name: Find and Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NajdOS-Complete-ISO
        path: |
          **/bin/Release/net8.0/*.iso
          **/*.iso
        if-no-files-found: error
        
