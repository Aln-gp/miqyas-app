name: Build CarPlay Final App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Create Structure and Entitlements
      run: |
        mkdir -p CarPlayFinal/CarPlayFinal
        cp *.swift CarPlayFinal/CarPlayFinal/ 2>/dev/null || true
        
        # حقن فئات الكاربلاي لتفعيل واجهة شاشة السيارة واللمس والبث
        cat <<EOF > CarPlayFinal/CarPlayFinal/CarPlayFinal.entitlements
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>com.apple.developer.carplay-maps</key>
            <true/>
            <key>com.apple.developer.playable-content</key>
            <true/>
        </dict>
        </plist>
        EOF

        # ملف نظام تشغيل الكاربلاي
        cat <<EOF > CarPlayFinal/CarPlayFinal/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <plist version="1.0">
        <dict>
            <key>CFBundleIdentifier</key>
            <string>com.yazan.carplayfinal</string>
            <key>CFBundleName</key>
            <string>CarPlayFinal</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>UIApplicationSceneManifest</key>
            <dict>
                <key>UIApplicationSupportsMultipleScenes</key>
                <true/>
                <key>UISceneConfigurations</key>
                <dict>
                    <key>CPTemplateApplicationSceneSessionRoleApplication</key>
                    <array>
                        <dict>
                            <key>UISceneConfigurationName</key>
                            <string>CarPlay</string>
                            <key>UISceneDelegateClassName</key>
                            <string>CarPlayFinal.CarPlaySceneDelegate</string>
                        </dict>
                    </array>
                </dict>
            </dict>
        </dict>
        </plist>
        EOF

    - name: Compile and Archive
      run: |
        cd CarPlayFinal
        xcodebuild archive -workspace . -scheme CarPlayFinal -configuration Release -archivePath $RUNNER_TEMP/CarPlayFinal.xcarchive CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO

    - name: Packaging to IPA
      run: |
        mkdir -p $RUNNER_TEMP/Payload
        cp -r $RUNNER_TEMP/CarPlayFinal.xcarchive/Products/Applications/*.app $RUNNER_TEMP/Payload/
        cd $RUNNER_TEMP && zip -r CarPlayFinal.ipa Payload

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CarPlay-Final-TrollStore
        path: ${{ runner.temp }}/CarPlayFinal.ipa
        
