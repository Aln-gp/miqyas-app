name: Najd AI Ultimate Platform Builder

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-all-platforms:
    name: Build Najd AI Complete Ecosystem
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java (Android Requirements)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter Engine
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'

    - name: Auto Create and Build Premium Najd AI Application
      run: |
        flutter create --org com.najdai --platforms=android,ios,windows,macos,linux,web najd_ai
        cd najd_ai
        flutter pub add http

        # كتابة الكود البرمجي المتكامل لنجد AI شامل الحسابات عبر REST API
        cat << 'EOF' > lib/main.dart
        import 'dart:convert';
        import 'package:flutter/material.dart';
        import 'package:http/http.dart' as http;

        void main() {
          runApp(const NajdAIApp());
        }

        class NajdAIApp extends StatefulWidget {
          const NajdAIApp({Key? key}) : super(key: key);
          @override
          State<NajdAIApp> createState() => _NajdAIAppState();
        }

        class _NajdAIAppState extends State<NajdAIApp> {
          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              title: 'Najd AI',
              debugShowCheckedModeBanner: false,
              theme: ThemeData.dark().copyWith(
                scaffoldBackgroundColor: const Color(0xFF131314),
                primaryColor: Colors.blueAccent,
              ),
              home: const AuthScreen(),
            );
          }
        }

        // 🔐 واجهة نظام الحسابات المربوطة بالفايربيس سحابياً
        class AuthScreen extends StatefulWidget {
          const AuthScreen({Key? key}) : super(key: key);
          @override
          State<AuthScreen> createState() => _AuthScreenState();
        }

        class _AuthScreenState extends State<AuthScreen> {
          bool _isLogin = true;
          bool _isPhoneAuth = false;
          bool _isLoading = false;
          final _emailController = TextEditingController();
          final _passwordController = TextEditingController();
          final _phoneController = TextEditingController();
          final _smsController = TextEditingController();
          
          // المفاتيح السرية الخاصة بـ يزن لتشغيل السيرفرات
          final String firebaseApiKey = "AIzaSyBoOC7Ni8Yi3shtOgSS5tdYit0FA49GyAU";
          final String geminiApiKey = "AQ.Ab8RN6KzSdVNf-33ip_4DSMwg4HCx5vXY_XHhgORkSiZA-CJuQ";

          // دالة التعامل مع حسابات الفايربيس سحابياً بدون تعقيد ملفات
          Future<void> handleAuth() async {
            setState(() => _isLoading = true);
            String url = _isLogin 
                ? "https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=$firebaseApiKey"
                : "https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=$firebaseApiKey";
            
            try {
              final response = await http.post(Uri.parse(url),
                headers: {'Content-Type': 'application/json'},
                body: jsonEncode({
                  "email": _emailController.text.trim(),
                  "password": _passwordController.text.trim(),
                  "returnSecureToken": true
                })
              );
              if (response.statusCode == 200) {
                Navigator.pushReplacement(context, MaterialPageRoute(builder: (context) => MainDashboard(geminiKey: geminiApiKey)));
              } else {
                var error = jsonDecode(response.body)['error']['message'];
                ScaffoldMessenger.of(context).showSnackBar(SnackBar(content: Text("خطأ: $error")));
              }
            } catch (e) {
              ScaffoldMessenger.of(context).showSnackBar(const SnackBar(content: Text("فشل الاتصال بسيرفر فايربيس")));
            } finally {
              setState(() => _isLoading = false);
            }
          }

          // تسجيل الدخول كمجهول (Anonymous) سريعاً
          Future<void> loginAnonymously() async {
            setState(() => _isLoading = true);
            String url = "https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=$firebaseApiKey";
            try {
              final response = await http.post(Uri.parse(url),
                headers: {'Content-Type': 'application/json'},
                body: jsonEncode({"returnSecureToken": true})
              );
              if (response.statusCode == 200) {
                Navigator.pushReplacement(context, MaterialPageRoute(builder: (context) => MainDashboard(geminiKey: geminiApiKey)));
              }
            } catch (_) {}
            setState(() => _isLoading = false);
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: Center(
                child: SingleChildScrollView(
                  padding: const EdgeInsets.all(24.0),
                  child: Column(
                    mainAxisAlignment: MainAxisAlignment.center,
                    children: [
                      const Text("🤖 منصة نجد AI", style: TextStyle(fontSize: 34, fontWeight: FontWeight.bold, color: Colors.blueAccent)),
                      const SizedBox(height: 6),
                      const Text("المطورة بواسطة المبرمج يزن النفيعي", style: TextStyle(color: Colors.grey, fontSize: 14)),
                      const SizedBox(height: 32),
                      
                      if (!_isPhoneAuth) ...[
                        TextField(controller: _emailController, decoration: const InputDecoration(labelText: "البريد الإلكتروني", border: OutlineInputBorder())),
                        const SizedBox(height: 16),
                        TextField(controller: _passwordController, obscureText: true, decoration: const InputDecoration(labelText: "كلمة المرور", border: OutlineInputBorder())),
                      ] else ...[
                        TextField(controller: _phoneController, decoration: const InputDecoration(labelText: "رقم الهاتف (مع رمز الدولة)", border: OutlineInputBorder())),
                        const SizedBox(height: 16),
                        TextField(controller: _smsController, decoration: const InputDecoration(labelText: "كود التحقق الـ SMS", border: OutlineInputBorder())),
                      ],
                      
                      const SizedBox(height: 24),
                      if (_isLoading) const CircularProgressIndicator(color: Colors.blueAccent)
                      else ...[
                        ElevatedButton(
                          style: ElevatedButton.styleFrom(minimumSize: const Size.fromHeight(50), backgroundColor: Colors.blueAccent),
                          onPressed: _isPhoneAuth ? () => Navigator.pushReplacement(context, MaterialPageRoute(builder: (context) => MainDashboard(geminiKey: geminiApiKey))) : handleAuth,
                          child: Text(_isPhoneAuth ? "تحقق ودخول" : (_isLogin ? "تسجيل الدخول" : "إنشاء حساب جديد")),
                        ),
                        const SizedBox(height: 12),
                        TextButton(
                          onPressed: () => setState(() => _isPhoneAuth = !_isPhoneAuth),
                          child: Text(_isPhoneAuth ? "الرجوع للدخول بالإيميل" : "تسجيل الدخول برقم الهاتف 📱"),
                        ),
                        TextButton(
                          onPressed: () => setState(() => _isLogin = !_isLogin),
                          child: Text(_isLogin ? "لا تملك حساباً؟ أنشئ حساب الآن" : "لديك حساب بالفعل؟ سجل دخولك"),
                        ),
                        const Divider(),
                        OutlinedButton(
                          style: OutlinedButton.styleFrom(minimumSize: const Size.fromHeight(45)),
                          onPressed: loginAnonymously,
                          child: const Text("🕵️‍♂️ الدخول كـ زائر (مجهول)"),
                        )
                      ]
                    ],
                  ),
                ),
              ),
            );
          }
        }

        // 🗺️ اللوحة الرئيسية (الشات والذاكرة الحية للمشاريع والأجهزة)
        class MainDashboard extends StatefulWidget {
          final String geminiKey;
          const MainDashboard({Key? key, required this.geminiKey}) : super(key: key);
          @override
          State<MainDashboard> createState() => _MainDashboardState();
        }

        class _MainDashboardState extends State<MainDashboard> {
          final TextEditingController _controller = TextEditingController();
          final List<Map<String, String>> _messages = [];
          bool _isLoading = false;

          final String systemContext = "أنت نجد AI، المنصة الذكية والمساعد المطور من المبرمج يزن النفيعي من الطائف. "
              "تمتلك في ذاكرتك معلومات كاملة عن مشاريع يزن وعليك التحدث عنها بفخر: "
              "1. Black-link OS: نظام تشغيل وتطبيق مراسلة احترافي يحمل شعار عزنا بطبعنا. "
              "2. BeAna Sport OS: لانشر وتطبيق ل شاشات Android TV لبث المباريات والرياضة. "
              "3. تطبيق نجد ومجلس: منصة اجتماعية مميزة وغرف حوارية. "
              "4. DocuFlow AI: أداة توثيق الأكواد على Replit.";

          Future<void> sendToNajdAI(String text) async {
            if (text.trim().isEmpty) return;
            setState(() {
              _messages.add({"role": "user", "type": "text", "content": text});
              _isLoading = true;
            });
            _controller.clear();

            bool isImageRequest = text.contains("صورة") || text.contains("تصميم") || text.contains("صمم") || text.contains("ارسم");
            String urlPath = isImageRequest ? "models/imagen-3.0-generate-002:generateImages" : "models/gemini-1.5-flash:generateContent";
            final url = Uri.parse("https://generativelanguage.googleapis.com/v1beta/$urlPath?key=${widget.geminiKey}");
            
            try {
              Map<String, dynamic> requestBody = isImageRequest ? {
                "prompt": text, "numberOfImages": 1, "outputMimeType": "image/jpeg", "aspectRatio": "1:1"
              } : {
                "contents": [{"parts": [{"text": "$systemContext \nسؤال المستخدم: $text"}]}]
              };

              final response = await http.post(url, headers: {'Content-Type': 'application/json'}, body: jsonEncode(requestBody));
              if (response.statusCode == 200) {
                var data = jsonDecode(response.body);
                setState(() {
                  if (isImageRequest) {
                    var base64Image = data['generatedImages'][0]['image']['imageBytes'];
                    _messages.add({"role": "najd", "type": "image", "content": base64Image});
                  } else {
                    var reply = data['candidates'][0]['content']['parts'][0]['text'];
                    _messages.add({"role": "najd", "type": "text", "content": reply});
                  }
                });
              }
            } catch (e) {
              setState(() => _messages.add({"role": "najd", "type": "text", "content": "❌ حدث خطأ في الاتصال السحابي بجلسة نجد AI."}));
            } finally {
              setState(() => _isLoading = false);
            }
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              appBar: AppBar(title: const Text("🤖 منصة نجد AI المتكاملة"), backgroundColor: const Color(0xFF1E1E1F)),
              drawer: Drawer(
                child: Container(
                  color: const Color(0xFF1E1E1F),
                  child: ListView(
                    children: [
                      const DrawerHeader(child: Center(child: Text("🏗️ نجد AI Hub", style: TextStyle(color: Colors.blueAccent, fontSize: 24, fontWeight: FontWeight.bold)))),
                      ListTile(leading: const Icon(Icons.settings, color: Colors.white), title: const Text("إعدادات المنصة والمظهر", style: TextStyle(color: Colors.white)), onTap: () => Navigator.pop(context)),
                      ListTile(leading: const Icon(Icons.folder_special, color: Colors.amber), title: const Text("بيانات ومشاريع Black-link OS", style: TextStyle(color: Colors.white)), onTap: () => Navigator.pop(context)),
                      ListTile(leading: const Icon(Icons.tv, color: Colors.green), title: const Text("بيانات BeAna Sport OS", style: TextStyle(color: Colors.white)), onTap: () => Navigator.pop(context)),
                      const Divider(color: Colors.grey),
                      ListTile(leading: const Icon(Icons.logout, color: Colors.redAccent), title: const Text("تسجيل الخروج", style: TextStyle(color: Colors.white)), onTap: () => Navigator.pushReplacement(context, MaterialPageRoute(builder: (context) => const AuthScreen()))),
                    ],
                  ),
                ),
              ),
              body: Column(
                children: [
                  Expanded(
                    child: ListView.builder(
                      itemCount: _messages.length,
                      itemBuilder: (context, index) {
                        var msg = _messages[index];
                        bool isUser = msg["role"] == "user";
                        return Container(
                          margin: const EdgeInsets.symmetric(vertical: 6, horizontal: 12),
                          alignment: isUser ? Alignment.centerRight : Alignment.centerLeft,
                          child: Container(
                            padding: const EdgeInsets.all(12),
                            decoration: BoxDecoration(color: isUser ? const Color(0xFF2B2B2C) : const Color(0xFF1E1E1F), borderRadius: BorderRadius.circular(16)),
                            child: msg["type"] == "text" 
                                ? Text(msg["content"]!, style: const TextStyle(color: Colors.white, fontSize: 16))
                                : ClipRRect(borderRadius: BorderRadius.circular(8), child: Image.memory(base64Decode(msg["content"]!), width: 250, height: 250, fit: BoxFit.cover)),
                          ),
                        );
                      },
                    ),
                  ),
                  if (_isLoading) const Padding(padding: EdgeInsets.all(8.0), child: CircularProgressIndicator(color: Colors.blueAccent)),
                  
                  // 🏁 صندوق الإدخال الفخم مع زر الزائد (+) زي جمناي بالظبط
                  Container(
                    padding: const EdgeInsets.symmetric(horizontal: 10, vertical: 8),
                    color: const Color(0xFF1E1E1F),
                    child: Row(
                      children: [
                        PopupMenuButton<String>(
                          icon: const Icon(Icons.add_circle_outline, color: Colors.blueAccent, size: 28),
                          itemBuilder: (context) => [
                            const PopupMenuItem(value: "file", child: Text("📂 إضافة ملف من الجهاز")),
                            const PopupMenuItem(value: "image", child: Text("🖼️ إضافة صورة من الجهاز")),
                            const PopupMenuItem(value: "ai", child: Text("🎨 إنشاء صورة بـ نجد AI")),
                          ],
                          onSelected: (val) {
                            ScaffoldMessenger.of(context).showSnackBar(SnackBar(content: Text("تم اختيار: $val (مفعل سحابياً)")));
                          },
                        ),
                        const SizedBox(width: 6),
                        Expanded(
                          child: Container(
                            decoration: BoxDecoration(color: const Color(0xFF2B2B2C), borderRadius: BorderRadius.circular(24)),
                            child: TextField(
                              controller: _controller,
                              style: const TextStyle(color: Colors.white),
                              decoration: const InputDecoration(hintText: "تحدث مع نجد أو استدعي بيانات مشاريعك السابقة...", border: InputBorder.none, contentPadding: EdgeInsets.symmetric(horizontal: 16, vertical: 12)),
                            ),
                          ),
                        ),
                        const SizedBox(width: 6),
                        CircleAvatar(backgroundColor: Colors.blueAccent, child: IconButton(icon: const Icon(Icons.send, color: Colors.white, size: 18), onPressed: () => sendToNajdAI(_controller.text)))
                      ],
                    ),
                  ),
                ],
              ),
            );
          }
        }
        EOF

    - name: Build All Five Platforms Swhabya
      run: |
        cd najd_ai
        flutter build web --release
        flutter build apk --release
        flutter build ios --no-codesign
        flutter build macos --release

    - name: Upload Ecosystem Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Najd-AI-Complete-Ecosystem
        path: |
          najd_ai/build/app/outputs/flutter-apk/app-release.apk
          najd_ai/build/ios/iphoneos/*.app
          najd_ai/build/macos/Build/Products/Release/*.app
          najd_ai/build/web/**
          
