name: Build Najd OS

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build Najd OS
      run: |
        dotnet restore NajdOS.sln
        dotnet build NajdOS.sln --configuration Release

    - name: Move ISO to Custom Folder
      shell: powershell
      run: |
        New-Item -ItemType Directory -Force -Path "NajdOS/NajdOS_Output"
        $sourcePath = "NajdOS/bin/Release/net8.0/NajdOS.iso"
        if (Test-Path $sourcePath) {
            Move-Item -Path $sourcePath -Destination "NajdOS/NajdOS_Output/NajdOS_New.iso" -Force
            Write-Output "ISO moved successfully!"
        } else {
            Write-Error "ISO file not found!"
            exit 1
        }

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: NajdOS-Complete-ISO
        path: NajdOS/NajdOS_Output/
        if-no-files-found: error
        
