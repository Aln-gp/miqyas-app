name: Build Najd OS

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build Najd OS
      run: |
        # الدخول للمجلد الصحيح أولاً حيث يوجد ملف الـ sln والمشروع
        cd NajdOS
        dotnet restore NajdOS.sln
        dotnet build NajdOS.sln --configuration Release

    - name: Find and Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NajdOS-Complete-ISO
        # البحث عن الـ ISO في كل مجلدات المشروع بعد البناء الحقيقي
        path: |
          NajdOS/bin/Release/net8.0/*.iso
          **/*.iso
        if-no-files-found: error
        
