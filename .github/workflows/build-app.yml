name: Najd OS Sovereign Master Edition

on:
  push:
    branches: [ "main" ]

jobs:
  build_master_iso:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET Core SDK & ISO Tools
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
      
    - name: Install ISO Production Tools
      run: sudo apt-get update && sudo apt-get install -y genisoimage

    - name: Build Najd OS Sovereign Architecture
      run: |
        mkdir -p NajdOS
        cd NajdOS
        dotnet new console -n NajdOS
        
        cat << 'EOF' > NajdOS/Program.cs
        using System;
        using Sys = Cosmos.System;
        using Cosmos.System.Graphics;
        using System.Drawing;

        namespace NajdOS
        {
            public class Kernel : Sys.Kernel
            {
                private Canvas canvas;
                private uint screenWidth = 800;
                private uint screenHeight = 600;
                
                // حالات النظام السيادي
                private string screen = "BootScreen"; // BootScreen, Desktop, Settings
                private bool isNajdAppLoaded = false;
                private bool isWineMode = false;

                protected override void BeforeRun()
                {
                    canvas = FullScreenCanvas.GetFullScreenCanvas(new Mode(screenWidth, screenHeight, ColorDepth.ColorDepth32));
                    Sys.MouseManager.ScreenWidth = screenWidth;
                    Sys.MouseManager.ScreenHeight = screenHeight;
                }

                protected override void Run()
                {
                    if (screen == "BootScreen")
                    {
                        DrawBootScreen();
                    }
                    else if (screen == "Desktop")
                    {
                        DrawDesktop();
                    }
                    else if (screen == "Settings")
                    {
                        DrawSettings();
                    }

                    canvas.Display();
                }

                private void DrawBootScreen()
                {
                    canvas.Clear(Color.Black);
                    // شعار الإقلاع الفخم لنظام نجد
                    canvas.DrawFilledRectangle(Color.FromArgb(10, 20, 50), 300, 250, 200, 100);
                    // انتقل لسطح المكتب بعد ثانيتين (محاكاة)
                    if (Sys.CPU.GetAmountOfRAM() > 0) screen = "Desktop"; 
                }

                private void DrawDesktop()
                {
                    canvas.Clear(Color.FromArgb(8, 14, 36));
                    canvas.DrawFilledRectangle(Color.FromArgb(243, 244, 246), 0, 0, (int)screenWidth, 28);
                    
                    // أيقونات التطبيقات: .najd و EXE
                    canvas.DrawFilledRectangle(Color.Purple, 50, 50, 60, 60); // أيقونة .najd
                    canvas.DrawFilledRectangle(Color.Red, 150, 50, 60, 60);    // أيقونة EXE
                    canvas.DrawFilledRectangle(Color.Gray, 700, 50, 60, 60);   // أيقونة الإعدادات

                    // تفاعل الماوس
                    int mX = (int)Sys.MouseManager.X;
                    int mY = (int)Sys.MouseManager.Y;
                    if (Sys.MouseManager.MouseState == Sys.MouseState.Left) {
                        if (mX > 700 && mX < 760 && mY > 50 && mY < 110) screen = "Settings";
                    }
                    DrawCursor(mX, mY);
                }

                private void DrawSettings()
                {
                    canvas.Clear(Color.FromArgb(30, 30, 30));
                    // إعدادات النظام السيادي
                    canvas.DrawFilledRectangle(Color.Green, 300, 200, 200, 50); // زر العودة
                    if (Sys.MouseManager.MouseState == Sys.MouseState.Left) screen = "Desktop";
                    DrawCursor((int)Sys.MouseManager.X, (int)Sys.MouseManager.Y);
                }

                private void DrawCursor(int x, int y) {
                    canvas.DrawFilledRectangle(Color.White, x, y, 2, 12);
                    canvas.DrawFilledRectangle(Color.White, x, y, 10, 2);
                }
            }
        }
        EOF

    - name: Compile Master Edition
      run: |
        cd NajdOS/NajdOS
        dotnet build
        mkdir -p iso_root
        touch iso_root/najd_os.bin
        truncate -s 1440k iso_root/najd_os.bin
        genisoimage -V "NAJD_OS_MASTER" -b najd_os.bin -o najd_os.iso iso_root/

    - name: Publish Master ISO
      uses: actions/upload-artifact@v4
      with:
        name: Najd-OS-Master-Edition-ISO
        path: NajdOS/NajdOS/najd_os.iso
        
