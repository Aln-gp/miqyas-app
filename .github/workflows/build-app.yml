name: Build Najd OS Integrated System

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Clear Cache and Restore Direct
      # تنظيف الكاش الغبي حق السيرفر وتمرير المصادر مباشرة في الأمر بدون ملف config
      run: |
        dotnet nuget locals all --clear
        cd NajdOS
        dotnet restore NajdOS.csproj --source "https://api.nuget.org/v3/index.json" --source "https://www.myget.org/F/cosmos/api/v3/index.json"

    - name: Compile and Build New ISO
      run: |
        cd NajdOS
        # بناء نظام نجد الجديد بالكامل (الواجهة والملفات) وحفظ الـ ISO في مجلد NajdOS_Builds
        dotnet build NajdOS.csproj --configuration Release --output ../NajdOS_Builds/

    - name: Upload Integrated ISO
      uses: actions/upload-artifact@v4
      with:
        name: NajdOS-Complete-ISO
        path: NajdOS_Builds/
        if-no-files-found: error
        
