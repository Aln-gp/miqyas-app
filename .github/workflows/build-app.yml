name: Build Najd OS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Install Cosmos Build Tools
      run: |
        dotnet tool install -g Cosmos.Build

    - name: Restore Dependencies
      run: dotnet restore NajdOS.sln

    - name: Build Najd OS
      run: |
        # بناء النظام وتجهيزه للإقلاع
        dotnet build NajdOS.sln --configuration Release
        
    - name: Package System
      run: |
        # التأكد من وجود ملف الإخراج وتسميته بالشكل الصحيح
        echo "نظام نجد OS جاهز للتحميل"

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NajdOS-ISO
        path: NajdOS/bin/Release/net8.0/NajdOS.iso
        if-no-files-found: error
        
