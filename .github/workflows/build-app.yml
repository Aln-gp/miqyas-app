name: Build Najd OS Integrated System

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Standard Local Restore
      # استعادة عادية ومحلية تماماً باستخدام المستودع الافتراضي للسيرفر
      run: |
        cd NajdOS
        dotnet restore NajdOS.csproj

    - name: Compile and Build New ISO
      # بناء النظام الجديد بالكامل وتوجيه ملف الـ ISO إلى مجلد مخصص اسمه NajdOS_Builds برا
      run: |
        cd NajdOS
        dotnet build NajdOS.csproj --configuration Release --output ../NajdOS_Builds/

    - name: Upload Integrated ISO
      uses: actions/upload-artifact@v4
      with:
        name: NajdOS-Complete-ISO
        path: NajdOS_Builds/
        if-no-files-found: error
        
