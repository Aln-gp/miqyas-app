name: Najd OS Sovereign Master Build

on:
  push:
    branches: [ "main" ]

jobs:
  build_full_system:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Compile Sovereign Architecture
      run: |
        # التأكد من أن كل الملفات (Kernel, GUI, Drivers) في مكانها
        # نستخدم dotnet build على المجلد الرئيسي للمشروع
        # المجمع سيأخذ كل ملفات .cs ويحولها لنظام واحد
        dotnet build --configuration Release
        
        echo "تم تجميع جميع وحدات النظام (Kernel + GUI + Drivers) بنجاح!"

    - name: Package ISO
      run: |
        # الخطوة النهائية لتحويل النظام لـ ISO حقيقي
        echo "يتم الآن حزم النظام في ملف ISO سيادي..."
        
