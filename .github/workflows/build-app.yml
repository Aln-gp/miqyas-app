name: Build Najd OS

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build Najd OS Solution
      # البناء مباشرة من المجلد الرئيسي حيث يوجد ملف الـ sln حقنا
      run: |
        dotnet restore NajdOS.sln
        dotnet build NajdOS.sln --configuration Release /p:Deploy=ISO /p:Description="NajdOS Build"

    - name: Find and Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NajdOS-Complete-ISO
        # البحث الشامل في كل المجلدات (بما فيها المجلدات الفرعية) لقطف ملف الـ ISO وضمان رفعه
        path: |
          **/bin/Release/**/*.iso
          **/*.iso
        if-no-files-found: error
        
