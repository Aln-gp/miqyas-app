name: Build CarPlay Final App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Compile and Bundle IPA
      run: |
        # 1. جلب مسار الحزمة الرسمية لنظام الـ iOS داخل السيرفر
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        
        # 2. بناء الكود البرمجي مباشرة وتحويله إلى ملف تنفيذي للآيفون (arm64)
        swiftc -target arm64-apple-ios15.0 \
          -sdk "$SDK_PATH" \
          -O \
          *.swift \
          -o CarPlayHub
          
        # 3. إنشاء هيكل حزمة التطبيق الرسمية (.app)
        mkdir -p Payload/CarPlayHub.app
        mv CarPlayHub Payload/CarPlayHub.app/CarPlayHub
        
        # 4. توليد ملف Info.plist مدمج به فئات التطبيق والكاربلاي واللمس
        cat <<EOF > Payload/CarPlayHub.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleIdentifier</key>
            <string>com.yazan.carplayfinal</string>
            <key>CFBundleName</key>
            <string>CarPlayHub</string>
            <key>CFBundleExecutable</key>
            <string>CarPlayHub</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>UIApplicationSceneManifest</key>
            <dict>
                <key>UIApplicationSupportsMultipleScenes</key>
                <true/>
                <key>UISceneConfigurations</key>
                <dict>
                    <key>CPTemplateApplicationSceneSessionRoleApplication</key>
                    <array>
                        <dict>
                            <key>UISceneConfigurationName</key>
                            <string>CarPlay</string>
                            <key>UISceneDelegateClassName</key>
                            <string>CarPlayFinal.CarPlaySceneDelegate</string>
                        </dict>
                    </array>
                </dict>
            </dict>
            <key>com.apple.developer.carplay-maps</key>
            <true/>
            <key>com.apple.developer.playable-content</key>
            <true/>
        </dict>
        </plist>
        EOF

        # 5. ضغط الملف بصيغة ipa النهائية جاهزة للتثبيت
        zip -r CarPlayFinal.ipa Payload
        
    - name: Upload Finished IPA
      uses: actions/upload-artifact@v4
      with:
        name: CarPlay-Final-TrollStore
        path: CarPlayFinal.ipa
        
