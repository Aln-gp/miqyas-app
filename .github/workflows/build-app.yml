name: Build Najd OS Integrated System

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build Najd OS (Local Workflow)
      # هذا هو الأمر المحلي المباشر اللي ضبط معنا في السيرفر
      run: |
        cd NajdOS
        dotnet build NajdOS.csproj --configuration Release

    - name: Collect and Route ISO to Project Folder
      shell: powershell
      run: |
        # إنشاء المجلد الثابت والمحدد داخل مشروعك لحفظ النظام الجديد
        mkdir -p NajdOS/NajdOS_Output
        
        # البحث عن ملف الـ ISO الجديد اللي بناه السيرفر محلياً ونقله للمجلد المخصص
        $isoFile = Get-ChildItem -Path . -Filter *.iso -Recurse | Select-Object -First 1
        if ($isoFile) {
            Move-Item -Path $isoFile.FullName -Destination "NajdOS/NajdOS_Output/NajdOS_New.iso" -Force
            Write-Output "تم حفظ ونقل الـ ISO الجديد بنجاح داخل مجلد المشروع!"
        } else {
            Write-Error "لم يتم العثور على ملف الـ ISO الجديد!"
            exit 1
        }

    - name: Upload Integrated ISO
      uses: actions/upload-artifact@v4
      with:
        name: NajdOS-Complete-ISO
        path: NajdOS/NajdOS_Output/
        if-no-files-found: error
        
