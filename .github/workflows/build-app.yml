name: Najd AI Ultimate Platform Builder

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-all-platforms:
    name: Build Najd AI Full Ecosystem
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Java (Android Requirements)
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter Engine
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'

    - name: Initialize Flutter Project
      run: |
        if [ ! -d "android" ] || [ ! -d "ios" ] || [ ! -d "web" ] || [ ! -d "macos" ]; then
          flutter create --platforms=android,ios,macos,web --project-name=miqyas_app .
        fi
        flutter pub get
        flutter pub add http || true

    - name: Inject Najd AI App Code
      run: |
        mkdir -p lib
        cat << 'EOF' > lib/main.dart
        import 'dart:convert';
        import 'package:flutter/material.dart';
        import 'package:http/http.dart' as http;

        void main() {
          runApp(const NajdAIApp());
        }

        class NajdAIApp extends StatefulWidget {
          const NajdAIApp({Key? key}) : super(key: key);
          @override
          State<NajdAIApp> createState() => _NajdAIAppState();
        }

        class _NajdAIAppState extends State<NajdAIApp> {
          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              title: 'Najd AI',
              debugShowCheckedModeBanner: false,
              theme: ThemeData.dark().copyWith(
                scaffoldBackgroundColor: const Color(0xFF0F0F10),
                primaryColor: const Color(0xFF2F80ED),
                cardColor: const Color(0xFF1A1A1C),
              ),
              home: const AuthScreen(),
            );
          }
        }

        class AuthScreen extends StatefulWidget {
          const AuthScreen({Key? key}) : super(key: key);
          @override
          State<AuthScreen> createState() => _AuthScreenState();
        }

        class _AuthScreenState extends State<AuthScreen> {
          bool _isLogin = true;
          bool _isPhoneAuth = false;
          bool _isLoading = false;
          final _emailController = TextEditingController();
          final _passwordController = TextEditingController();
          final _phoneController = TextEditingController();
          final _smsController = TextEditingController();
          
          final String firebaseApiKey = String.fromEnvironment('FIREBASE_API_KEY');
          final String geminiApiKey = String.fromEnvironment('GEMINI_API_KEY');

          Future<void> handleAuth() async {
            if (!_isPhoneAuth && (_emailController.text.isEmpty || _passwordController.text.isEmpty)) {
              showErrorDialog("تنبيه", "الرجاء تعبئة جميع الحقول المطلوبة.");
              return;
            }
            setState(() => _isLoading = true);
            String url = _isLogin 
                ? "https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=$firebaseApiKey"
                : "https://identitytoolkit.googleapis.com/v1/accounts:signUp?key=$firebaseApiKey";
            
            try {
              final response = await http.post(Uri.parse(url),
                headers: {'Content-Type': 'application/json'},
                body: jsonEncode({
                  "email": _emailController.text.trim(),
                  "password": _passwordController.text.trim(),
                  "returnSecureToken": true
                })
              );
              if (response.statusCode == 200) {
                navigateToDashboard();
              } else {
                var resBody = jsonDecode(response.body);
                String errorMsg = resBody['error'] != null ? resBody['error']['message'] : "خطأ غير معروف";
                showErrorDialog("فشل الرد من السيرفر", "الرمز المرتجع: $errorMsg \nكود الحالة: ${response.statusCode}");
              }
            } catch (e) {
              showErrorDialog("مشكلة في الشبكة", "فشل الاتصال التام بالسيرفر السحابي: $e");
            } finally {
              setState(() => _isLoading = false);
            }
          }

          Future<void> loginAnonymously() async {
            setState(() => _isLoading = true);
            navigateToDashboard();
            setState(() => _isLoading = false);
          }

          void navigateToDashboard() {
            Navigator.pushReplacement(
              context, 
              MaterialPageRoute(builder: (context) => MainDashboard(geminiKey: geminiApiKey))
            );
          }

          void showErrorDialog(String title, String message) {
            showDialog(
              context: context,
              builder: (ctx) => AlertDialog(
                backgroundColor: const Color(0xFF1A1A1C),
                title: Text(title, style: const TextStyle(color: Colors.redAccent, fontWeight: FontWeight.bold)),
                content: Text(message, style: const TextStyle(color: Colors.white70)),
                actions: [
                  TextButton(onPressed: () => Navigator.pop(ctx), child: const Text("موافق", style: TextStyle(color: Color(0xFF2F80ED))))
                ],
              ),
            );
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: Container(
                decoration: const BoxDecoration(
                  gradient: LinearGradient(
                    colors: [Color(0xFF0F0F10), Color(0xFF1A1B20)],
                    begin: Alignment.topCenter,
                    end: Alignment.bottomCenter,
                  ),
                ),
                child: Center(
                  child: SingleChildScrollView(
                    padding: const EdgeInsets.all(28.0),
                    child: Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: [
                        Container(
                          padding: const EdgeInsets.all(16),
                          decoration: BoxDecoration(
                            color: const Color(0xFF2F80ED).withOpacity(0.1),
                            shape: BoxShape.circle,
                            border: Border.all(color: const Color(0xFF2F80ED).withOpacity(0.3), width: 2)
                          ),
                          child: const Icon(Icons.psychology, size: 64, color: Color(0xFF2F80ED)),
                        ),
                        const SizedBox(height: 20),
                        const Text("🤖 منصة نجد AI", style: TextStyle(fontSize: 36, fontWeight: FontWeight.w900, color: Colors.white)),
                        const Text("المطورة بواسطة المبرمج يزن النفيعي", style: TextStyle(color: Colors.grey, fontSize: 13)),
                        const SizedBox(height: 40),
                        
                        if (!_isPhoneAuth) ...[
                          TextField(
                            controller: _emailController,
                            style: const TextStyle(color: Colors.white),
                            decoration: InputDecoration(
                              labelText: "البريد الإلكتروني",
                              labelStyle: const TextStyle(color: Colors.white60),
                              filled: true,
                              fillColor: const Color(0xFF161618),
                              prefixIcon: const Icon(Icons.email_outlined, color: Color(0xFF2F80ED)),
                              border: OutlineInputBorder(borderRadius: BorderRadius.circular(16), borderSide: BorderSide.none),
                            ),
                          ),
                          const SizedBox(height: 16),
                          TextField(
                            controller: _passwordController,
                            obscureText: true,
                            style: const TextStyle(color: Colors.white),
                            decoration: InputDecoration(
                              labelText: "كلمة المرور",
                              labelStyle: const TextStyle(color: Colors.white60),
                              filled: true,
                              fillColor: const Color(0xFF161618),
                              prefixIcon: const Icon(Icons.lock_outline, color: Color(0xFF2F80ED)),
                              border: OutlineInputBorder(borderRadius: BorderRadius.circular(16), borderSide: BorderSide.none),
                            ),
                          ),
                        ] else ...[
                          TextField(
                            controller: _phoneController,
                            style: const TextStyle(color: Colors.white),
                            decoration: InputDecoration(
                              labelText: "رقم الهاتف",
                              labelStyle: const TextStyle(color: Colors.white60),
                              filled: true,
                              fillColor: const Color(0xFF161618),
                              prefixIcon: const Icon(Icons.phone_android, color: Color(0xFF2F80ED)),
                              border: OutlineInputBorder(borderRadius: BorderRadius.circular(16), borderSide: BorderSide.none),
                            ),
                          ),
                          const SizedBox(height: 16),
                          TextField(
                            controller: _smsController,
                            style: const TextStyle(color: Colors.white),
                            decoration: InputDecoration(
                              labelText: "كود التحقق",
                              labelStyle: const TextStyle(color: Colors.white60),
                              filled: true,
                              fillColor: const Color(0xFF161618),
                              prefixIcon: const Icon(Icons.sms_outlined, color: Color(0xFF2F80ED)),
                              border: OutlineInputBorder(borderRadius: BorderRadius.circular(16), borderSide: BorderSide.none),
                            ),
                          ),
                        ],
                        
                        const SizedBox(height: 28),
                        if (_isLoading) 
                          const CircularProgressIndicator(color: Color(0xFF2F80ED))
                        else ...[
                          Container(
                            decoration: BoxDecoration(
                              borderRadius: BorderRadius.circular(16),
                              gradient: const LinearGradient(colors: [Color(0xFF2F80ED), Color(0xFF0056C6)])
                            ),
                            child: ElevatedButton(
                              style: ElevatedButton.styleFrom(
                                minimumSize: const Size.fromHeight(54), 
                                backgroundColor: Colors.transparent,
                                shadowColor: Colors.transparent,
                                shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(16))
                              ),
                              onPressed: _isPhoneAuth ? navigateToDashboard : handleAuth,
                              child: Text(_isPhoneAuth ? "تحقق ودخول" : (_isLogin ? "تسجيل الدخول" : "إنشاء حساب جديد"), style: const TextStyle(fontSize: 16, fontWeight: FontWeight.bold, color: Colors.white)),
                            ),
                          ),
                          const SizedBox(height: 16),
                          Row(
                            mainAxisAlignment: MainAxisAlignment.spaceBetween,
                            children: [
                              TextButton(
                                onPressed: () => setState(() => _isPhoneAuth = !_isPhoneAuth),
                                child: Text(_isPhoneAuth ? "الدخول بالإيميل" : "تسجيل بالهاتف 📱", style: const TextStyle(color: Colors.white70)),
                              ),
                              TextButton(
                                onPressed: () => setState(() => _isLogin = !_isLogin),
                                child: Text(_isLogin ? "إنشاء حساب" : "لديك حساب؟", style: const TextStyle(color: Color(0xFF2F80ED), fontWeight: FontWeight.bold)),
                              ),
                            ],
                          ),
                          const Padding(
                            padding: EdgeInsets.symmetric(vertical: 12.0),
                            child: Row(children: [Expanded(child: Divider(color: Colors.white12)), Padding(padding: EdgeInsets.symmetric(horizontal: 10), child: Text("أو", style: TextStyle(color: Colors.white38))), Expanded(child: Divider(color: Colors.white12))]),
                          ),
                          OutlinedButton.icon(
                            style: OutlinedButton.styleFrom(
                              minimumSize: const Size.fromHeight(50),
                              side: const BorderSide(color: Colors.white24),
                              shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(16)),
                            ),
                            icon: const Icon(Icons.person_outline, color: Colors.white60),
                            onPressed: loginAnonymously,
                            label: const Text("🕵️‍♂️ تخطي والدخول كـ زائر مباشر", style: TextStyle(color: Colors.white, fontSize: 15)),
                          )
                        ]
                      ],
                    ),
                  ),
                ),
              ),
            );
          }
        }

        class MainDashboard extends StatefulWidget {
          final String geminiKey;
          const MainDashboard({Key? key, required this.geminiKey}) : super(key: key);
          @override
          State<MainDashboard> createState() => _MainDashboardState();
        }

        class _MainDashboardState extends State<MainDashboard> {
          final TextEditingController _controller = TextEditingController();
          final List<Map<String, String>> _messages = [];
          bool _isLoading = false;

          final String systemContext = "أنت نجد AI، المنصة الذكية والمساعد المطور من المبرمج يزن النفيعي من الطائف. "
              "تمتلك في ذاكرتك معلومات كاملة عن مشاريع يزن وعليك التحدث عنها بفخر: "
              "1. Black-link OS: نظام تشغيل وتطبيق مراسلة احترافي يحمل شعار عزنا بطبعنا. "
              "2. BeAna Sport OS: لانشر وتطبيق ل شاشات Android TV لبث المباريات والرياضة. "
              "3. تطبيق نجد ومجلس: منصة اجتماعية مميزة وغرف حوارية. "
              "4. DocuFlow AI: أداة توثيق الأكواد على Replit.";

          Future<void> sendToNajdAI(String text) async {
            if (text.trim().isEmpty) return;
            setState(() {
              _messages.add({"role": "user", "type": "text", "content": text});
              _isLoading = true;
            });
            _controller.clear();

            bool isImageRequest = text.contains("صورة") || text.contains("تصميم") || text.contains("صمم") || text.contains("ارسم");
            String urlPath = isImageRequest ? "models/imagen-3.0-generate-002:generateImages" : "models/gemini-1.5-flash:generateContent";
            final url = Uri.parse("https://generativelanguage.googleapis.com/v1beta/$urlPath?key=${widget.geminiKey}");
            
            try {
              Map<String, dynamic> requestBody = isImageRequest ? {
                "prompt": text, "numberOfImages": 1, "outputMimeType": "image/jpeg", "aspectRatio": "1:1"
              } : {
                "contents": [{"parts": [{"text": "$systemContext \nسؤال المستخدم: $text"}]}]
              };

              final response = await http.post(url, headers: {'Content-Type': 'application/json'}, body: jsonEncode(requestBody));
              if (response.statusCode == 200) {
                var data = jsonDecode(response.body);
                setState(() {
                  if (isImageRequest) {
                    var base64Image = data['generatedImages'][0]['image']['imageBytes'];
                    _messages.add({"role": "najd", "type": "image", "content": base64Image});
                  } else {
                    var reply = data['candidates'][0]['content']['parts'][0]['text'];
                    _messages.add({"role": "najd", "type": "text", "content": reply});
                  }
                });
              }
            } catch (e) {
              setState(() => _messages.add({"role": "najd", "type": "text", "content": "❌ حدث خطأ في الاتصال بجلسة نجد AI."}));
            } finally {
              setState(() => _isLoading = false);
            }
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              appBar: AppBar(
                title: const Text("🤖 نجد AI - اللوحة الذكية"),
                backgroundColor: const Color(0xFF161618),
                elevation: 0,
              ),
              drawer: Drawer(
                child: Container(
                  color: const Color(0xFF161618),
                  child: ListView(
                    children: [
                      const DrawerHeader(
                        child: Center(
                          child: Text("🏗️ نجد AI Hub", style: TextStyle(color: Color(0xFF2F80ED), fontSize: 24, fontWeight: FontWeight.bold))
                        )
                      ),
                      ListTile(leading: const Icon(Icons.settings, color: Colors.white), title: const Text("إعدادات المنصة والمظهر")),
                      ListTile(leading: const Icon(Icons.folder_special, color: Colors.amber), title: const Text("بيانات ومشاريع Black-link OS")),
                      ListTile(leading: const Icon(Icons.tv, color: Colors.green), title: const Text("بيانات BeAna Sport OS")),
                      const Divider(color: Colors.white10),
                      ListTile(
                        leading: const Icon(Icons.logout, color: Colors.redAccent), 
                        title: const Text("تسجيل الخروج"), 
                        onTap: () => Navigator.pushReplacement(context, MaterialPageRoute(builder: (context) => const AuthScreen()))
                      ),
                    ],
                  ),
                ),
              ),
              body: Column(
                children: [
                  Expanded(
                    child: ListView.builder(
                      itemCount: _messages.length,
                      itemBuilder: (context, index) {
                        var msg = _messages[index];
                        bool isUser = msg["role"] == "user";
                        return Container(
                          margin: const EdgeInsets.symmetric(vertical: 6, horizontal: 12),
                          alignment: isUser ? Alignment.centerRight : Alignment.centerLeft,
                          child: Container(
                            padding: const EdgeInsets.all(14),
                            decoration: BoxDecoration(
                              color: isUser ? const Color(0xFF232326) : const Color(0xFF161618), 
                              borderRadius: BorderRadius.circular(16)
                            ),
                            child: msg["type"] == "text" 
                                ? Text(msg["content"]!, style: const TextStyle(color: Colors.white, fontSize: 15))
                                : ClipRRect(borderRadius: BorderRadius.circular(12), child: Image.memory(base64Decode(msg["content"]!), width: 250, height: 250, fit: BoxFit.cover)),
                          ),
                        );
                      },
                    ),
                  ),
                  if (_isLoading) const P
