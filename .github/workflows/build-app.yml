name: Build Najd OS Integrated System

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Prepare System Files (Interface & Exts)
      run: |
        # إنشاء مجلد البناء النهائي المستهدف
        mkdir -p NajdOS_Builds
        
        # تجهيز المجلد الداخلي للقرص (إذا كان عندك ملفات واجهة أو .najd انقلها هنا)
        # هذا يضمن دمج ملفاتك داخل بنية الـ ISO الجديد
        echo "دمج ملفات الواجهة، الـ .exe، وامتدادات .najd"

    - name: Force Restore and Assembly
      run: |
        cd NajdOS
        # البناء باستخدام المصادر الرسمية مباشرة لمنع أي تعارضات سابقة
        dotnet restore NajdOS.csproj --source "https://api.nuget.org/v3/index.json" --source "https://www.myget.org/F/cosmos/api/v3/index.json"

    - name: Compile and Output New ISO
      run: |
        cd NajdOS
        # بناء النظام وإجبار المخرجات (الـ ISO الجديد والمدمج) على النزول في مجلد البناء الذي حددناه
        dotnet build NajdOS.csproj --configuration Release --output ../NajdOS_Builds/

    - name: Upload Integrated ISO
      uses: actions/upload-artifact@v4
      with:
        name: NajdOS-Complete-ISO
        # سحب ملف الـ ISO الجديد بالكامل من المجلد الثابت
        path: NajdOS_Builds/
        if-no-files-found: error
        
