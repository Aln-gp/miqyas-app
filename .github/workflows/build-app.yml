name: Build Najd OS

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: |
        cd NajdOS
        dotnet restore NajdOS.csproj --source https://www.myget.org/F/cosmos/api/v3/index.json --source https://api.nuget.org/v3/index.json

    - name: Build ISO to Custom Folder
      run: |
        cd NajdOS
        dotnet build NajdOS.csproj --configuration Release

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NajdOS-ISO
        # الحين المسار صار محدد ومضمون داخل مجلد Dist اللي اخترناه
        path: NajdOS/bin/Release/net8.0/Dist/
        if-no-files-found: error
        
