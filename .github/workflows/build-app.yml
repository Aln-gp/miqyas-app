name: AI Ultimate App Builder v12
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Accept Android licenses
      run: yes | flutter doctor --android-licenses

    - name: Create and Code Perfect Miqyas Store
      run: |
        flutter create --project-name=miqyas_app --platforms=android,ios miqyas_store
        cd miqyas_store
        rm -f lib/main.dart
        mkdir -p lib
        cat << 'EOF' > lib/main.dart
        import 'package:flutter/material.dart';
        import 'dart:ui';

        void main() {
          runApp(const MiqyasApp());
        }

        class MiqyasApp extends StatelessWidget {
          const MiqyasApp({super.key});

          @override
          Widget build(BuildContext context) {
            return MaterialApp(
              debugShowCheckedModeBanner: false,
              title: 'متجر مقياس',
              locale: const Locale('ar', 'SA'),
              theme: ThemeData(
                primaryColor: Colors.deepPurple,
                colorScheme: ColorScheme.fromSeed(seedColor: Colors.deepPurple),
                scaffoldBackgroundColor: const Color(0xfffdfbf7),
              ),
              home: const LoginPage(),
            );
          }
        }

        class LoginPage extends StatefulWidget {
          const LoginPage({super.key});

          @override
          State<LoginPage> createState() => _LoginPageState();
        }

        class _LoginPageState extends State<LoginPage> {
          @override
          Widget build(BuildContext context) {
            return Scaffold(
              body: Center(
                child: SingleChildScrollView(
                  padding: const EdgeInsets.all(24.0),
                  child: Column(
                    mainAxisAlignment: MainAxisAlignment.center,
                    children: [
                      const Icon(Icons.storefront, size: 90, color: Colors.deepPurple),
                      const SizedBox(height: 16),
                      const Text(
                        'متجر مقياس',
                        style: TextStyle(fontSize: 32, fontWeight: FontWeight.bold, color: Colors.deepPurple),
                      ),
                      const SizedBox(height: 8),
                      const Text('بوابتك للتجارة والدروب شيبنج الذكي', style: TextStyle(color: Colors.grey, fontSize: 16)),
                      const SizedBox(height: 32),
                      TextField(
                        textAlign: TextAlign.right,
                        decoration: InputDecoration(
                          labelText: 'البريد الإلكتروني',
                          border: OutlineInputBorder(borderRadius: BorderRadius.circular(12)),
                          prefixIcon: const Icon(Icons.email),
                        ),
                      ),
                      const SizedBox(height: 16),
                      TextField(
                        obscureText: true,
                        textAlign: TextAlign.right,
                        decoration: InputDecoration(
                          labelText: 'كلمة المرور',
                          border: OutlineInputBorder(borderRadius: BorderRadius.circular(12)),
                          prefixIcon: const Icon(Icons.lock),
                        ),
                      ),
                      Align(
                        alignment: Alignment.centerLeft,
                        child: TextButton(
                          onPressed: () {},
                          child: const Text('هل نسيت الرمز السري؟', style: TextStyle(color: Colors.deepPurple)),
                        ),
                      ),
                      const SizedBox(height: 16),
                      SizedBox(
                        width: double.infinity,
                        height: 52,
                        child: ElevatedButton(
                          onPressed: () {
                            Navigator.pushReplacement(
                              context,
                              MaterialPageRoute(builder: (context) => const MainNavigationPage()),
                            );
                          },
                          style: ElevatedButton.styleFrom(
                            backgroundColor: Colors.deepPurple,
                            shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12)),
                          ),
                          child: const Text('تسجيل الدخول', style: TextStyle(fontSize: 18, color: Colors.white, fontWeight: FontWeight.bold)),
                        ),
                      ),
                      const SizedBox(height: 20),
                      Row(
                        children: const [
                          Expanded(child: Divider()),
                          Padding(
                            padding: EdgeInsets.symmetric(horizontal: 10),
                            child: Text('أو سجل عبر', style: TextStyle(color: Colors.grey)),
                          ),
                          Expanded(child: Divider()),
                        ],
                      ),
                      const SizedBox(height: 20),
                      SizedBox(
                        width: double.infinity,
                        height: 52,
                        child: OutlinedButton.icon(
                          onPressed: () {},
                          icon: const Icon(Icons.g_mobiledata, size: 30, color: Colors.red),
                          label: const Text('تسجيل الدخول عبر قوقل', style: TextStyle(fontSize: 16, color: Colors.black87)),
                          style: OutlinedButton.styleFrom(
                            shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12)),
                            side: const BorderSide(color: Colors.grey),
                          ),
                        ),
                      ),
                      const SizedBox(height: 24),
                      Row(
                        mainAxisAlignment: MainAxisAlignment.center,
                        children: [
                          const Text('ليس لديك حساب؟'),
                          TextButton(
                            onPressed: () {},
                            child: const Text('تسجيل حساب جديد', style: TextStyle(fontWeight: FontWeight.bold, color: Colors.deepPurple)),
                          ),
                        ],
                      ),
                    ],
                  ),
                ),
              ),
            );
          }
        }

        class MainNavigationPage extends StatefulWidget {
          const MainNavigationPage({super.key});

          @override
          State<MainNavigationPage> createState() => _MainNavigationPageState();
        }

        class _MainNavigationPageState extends State<MainNavigationPage> {
          int _selectedIndex = 0;
          
          final List<Widget> _pages = [
            const HomePage(),
            const Center(child: Text('الأقسام قادمة قريباً', style: TextStyle(fontSize: 20))),
            const Center(child: Text('السلة فارغة حالياً', style: TextStyle(fontSize: 20))),
            const Center(child: Text('الملف الشخصي', style: TextStyle(fontSize: 20))),
          ];

          @override
          Widget build(BuildContext context) {
            bool isIos = Theme.of(context).platform == TargetPlatform.iOS;
            bool isTransparencyDisabled = MediaQuery.of(context).accessibleNavigation;
            bool showGlassEffect = isIos && !isTransparencyDisabled;

            return Scaffold(
              extendBody: showGlassEffect,
              body: Directionality(
                textDirection: TextDirection.rtl,
                child: _pages[_selectedIndex],
              ),
              bottomNavigationBar: Directionality(
                textDirection: TextDirection.rtl,
                child: showGlassEffect 
                  ? Container(
                      height: 85,
                      color: Colors.transparent,
                      child: Stack(
                        children: [
                          ClipRRect(
                            child: BackdropFilter(
                              filter: ImageFilter.blur(sigmaX: 20.0, sigmaY: 20.0),
                              child: Container(
                                decoration: BoxDecoration(
                                  color: Colors.white.withOpacity(0.65), 
                                  border: Border(top: BorderSide(color: Colors.white.withOpacity(0.4), width: 0.5)),
                                ),
                              ),
                            ),
                          ),
                          BottomNavigationBar(
                            currentIndex: _selectedIndex,
                            onTap: (index) {
                              setState(() {
                                _selectedIndex = index;
                              });
                            },
                            type: BottomNavigationBarType.fixed,
                            backgroundColor: Colors.transparent,
                            elevation: 0,
                            selectedItemColor: Colors.deepPurple,
                            unselectedItemColor: Colors.grey[700],
                            items: const [
                              BottomNavigationBarItem(icon: Icon(Icons.home_filled), label: 'الرئيسية'),
                              BottomNavigationBarItem(icon: Icon(Icons.category_outlined), label: 'الأقسام'),
                              BottomNavigationBarItem(icon: Icon(Icons.shopping_bag_outlined), label: 'السلة'),
                              BottomNavigationBarItem(icon: Icon(Icons.person_outline), label: 'حسابي'),
                            ],
                          ),
                        ],
                      ),
                    )
                  : BottomNavigationBar(
                      currentIndex: _selectedIndex,
                      onTap: (index) {
                        setState(() {
                          _selectedIndex = index;
                        });
                      },
                      type: BottomNavigationBarType.fixed,
                      backgroundColor: Colors.white,
                      elevation: 8,
                      selectedItemColor: Colors.deepPurple,
                      unselectedItemColor: Colors.grey[600],
                      items: const [
                        BottomNavigationBarItem(icon: Icon(Icons.home_filled), label: 'الرئيسية'),
                        BottomNavigationBarItem(icon: Icon(Icons.category_outlined), label: 'الأقسام'),
                        BottomNavigationBarItem(icon: Icon(Icons.shopping_bag_outlined), label: 'السلة'),
                        BottomNavigationBarItem(icon: Icon(Icons.person_outline), label: 'حسابي'),
                      ],
                    ),
              ),
            );
          }
        }

        class HomePage extends StatelessWidget {
          const HomePage({super.key});

          @override
          Widget build(BuildContext context) {
            bool isIos = Theme.of(context).platform == TargetPlatform.iOS;
            bool isTransparencyDisabled = MediaQuery.of(context).accessibleNavigation;
            bool showGlassEffect = isIos && !isTransparencyDisabled;

            return Scaffold(
              appBar: AppBar(
                title: const Text('متجر مقياس الإلكتروني', style: TextStyle(fontWeight: FontWeight.bold)),
                backgroundColor: Colors.deepPurple,
                foregroundColor: Colors.white,
                elevation: 0,
              ),
              body: SingleChildScrollView(
                padding: EdgeInsets.only(
                  bottom: showGlassEffect ? 100 : 20,
                  left: 16, 
                  right: 16, 
                  top: 16
                ),
                child: Column(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    TextField(
                      decoration: InputDecoration(
                        hintText: 'ابحث عن منتجات، ماركات...',
                        prefixIcon: const Icon(Icons.search),
                        border: OutlineInputBorder(borderRadius: BorderRadius.circular(12)),
                        filled: true,
                        fillColor: Colors.white,
                      ),
                    ),
                    const SizedBox(height: 20),
                    Container(
                      width: double.infinity,
                      padding: const EdgeInsets.all(20),
                      decoration: BoxDecoration(
                        gradient: const LinearGradient(colors: [Colors.deepPurple, Colors.indigo]),
                        borderRadius: BorderRadius.circular(16),
                      ),
                      child: const Column(
                        crossAxisAlignment: CrossAxisAlignment.start,
                        children: [
                          Text('عروض الصيف الفخمة! 🔥', style: TextStyle(color: Colors.white, fontSize: 20, fontWeight: FontWeight.bold)),
                          SizedBox(height: 8),
                          Text('خصومات تصل إلى 50% على المنتجات الأكثر طلباً', style: TextStyle(color: Colors.white70)),
                        ],
                      ),
                    ),
                    const SizedBox(height: 24),
                    const Text('أحدث المنتجات', style: TextStyle(fontSize: 22, fontWeight: FontWeight.bold)),
                    const SizedBox(height: 12),
                    GridView.builder(
                      shrinkWrap: true,
                      physics: const NeverScrollableScrollPhysics(),
                      gridDelegate: const SliverGridDelegateWithFixedCrossAxisCount(
                        crossAxisCount: 2,
                        childAspectRatio: 0.75,
                        crossAxisSpacing: 12,
                        mainAxisSpacing: 12,
                      ),
                      itemCount: 6,
                      itemBuilder: (context, index) {
                        final products = ['ساعة ذكية برو', 'سماعات لاسلكية', 'شاحن سريع خارق', 'لوحة مفاتيح ميكانيكية', 'قاعدة شحن ذكي', 'جراب حماية'];
                        final prices = ['299 ر.س', '149 ر.س', '89 ر.س', '249 ر.س', '119 ر.س', '179 ر.س'];
                        return Card(
                          shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12)),
                          child: Padding(
                            padding: const EdgeInsets.all(8.0),
                            child: Column(
                              crossAxisAlignment: CrossAxisAlignment.start,
                              children: [
                                Expanded(
                                  child: Container(
                                    width: double.infinity,
                                    decoration: BoxDecoration(color: Colors.grey[200], borderRadius: BorderRadius.circular(8)),
                                    child: const Icon(Icons.image, size: 50, color: Colors.grey),
                                  ),
                                ),
                                const SizedBox(height: 8),
                                Text(products[index], style: const TextStyle(fontWeight: FontWeight.bold)),
                                const SizedBox(height: 4),
                                Row(
                                  mainAxisAlignment: MainAxisAlignment.spaceBetween,
                                  children: [
                                    Text(prices[index], style: const TextStyle(color: Colors.deepPurple, fontWeight: FontWeight.bold)),
                                    IconButton(icon: const Icon(Icons.add_shopping_cart, size: 20, color: Colors.deepPurple), onPressed: () {}),
                                  ],
                                ),
                              ],
                            ),
                          ),
                        );
                      },
                    ),
                  ],
                ),
              ),
            );
          }
        }
        EOF

    - name: Build Android APK
      run: |
        cd miqyas_store
        flutter build apk --release

    - name: Build iOS IPA (Unsigned)
      run: |
        cd miqyas_store
        flutter build ios --release --no-codesign
        mkdir -p Payload
        mv build/ios/iphoneos/Runner.app Payload/
        zip -r app-release.ipa Payload

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: miqyas-android-apk
        path: miqyas_store/build/app/outputs/flutter-apk/app-release.apk

    - name: Upload iOS IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: miqyas-ios-ipa
        path: miqyas_store/app-release.ipa
