name: Build Najd OS Integrated System

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      # هنا خلينا المسار يقرأ الـ nuget.config اللي برا في المستودع الرئيسي مباشرة
      run: |
        dotnet restore NajdOS/NajdOS.csproj --configfile nuget.config

    - name: Compile and Output New ISO
      run: |
        cd NajdOS
        # بناء النظام بالواجهة والملفات الجديدة، وحفظ الـ ISO في مجلد محدد اسمه NajdOS_Builds برا
        dotnet build NajdOS.csproj --configuration Release --output ../NajdOS_Builds/

    - name: Upload Integrated ISO
      uses: actions/upload-artifact@v4
      with:
        name: NajdOS-Complete-ISO
        path: NajdOS_Builds/
        if-no-files-found: error
        
