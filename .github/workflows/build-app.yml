name: Najd AI Anti-Glitch OS Builder v15.0
on:
  workflow_dispatch:

jobs:
  ai-generate-pure-os:
    runs-on: ubuntu-latest
    steps:
    - name: 1️⃣ سحب ملفات المستودع بالكامل
      uses: actions/checkout@v4

    - name: 2️⃣ تثبيت مترجمات الأنظمة للغات المنخفضة (NASM & GCC)
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc-multilib binutils xorriso grub-pc-bin

    - name: 3️⃣ تثبيت مكتبة الـ AI وإصلاح أخطاء المدلع نهائياً
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        pip install --upgrade google-generativeai
        
        python3 -c "
        import os, re, google.generativeai as genai
        genai.configure(api_key=os.environ['GEMINI_API_KEY'])
        
        model = genai.GenerativeModel('gemini-1.5-pro')
        
        system_instruction = '''
        اكتب كود C كامل ونظيف جداً مخصص للأنظمة (Bare-Metal C) لنظام تشغيل كونسول نجد للألعاب.
        يجب أن يقوم الكود بتهيئة الشاشة الرسومية VGA 0xA0000 ورسم واجهة مستخدم (Dashboard) مخصصة بخلفية بنفسجية داكنة وحدود ذهبية، مقسمة لثلاثة أقسام: مكتبة الألعاب، المتجر، والإعدادات، مع كود أسمبلي بسيط للإقلاع.
        اكتب الأكواد البرمجية مباشرة وبدون أي مقدمات أو شروحات.
        '''
        
        response = model.generate_content(system_instruction)
        raw_text = response.text.strip()
        
        # تنظيف الكود أوتوماتيكياً من أي علامات ماركدوان قد يضعها الـ AI بالخطأ لضمان عدم فشل السيرفر 👇
        clean_code = re.sub(r'```[a-zA-Z]*', '', raw_text)
        clean_code = clean_code.replace('```', '')
        
        os.makedirs('src', exist_ok=True)
        with open('src/najd_os_core.c', 'w', encoding='utf-8') as f:
            f.write(clean_code.strip())
        print('✅ تم تنظيف وحقن كود نظام نجد بنجاح رغماً عن أنف المدلع!')
        "

    - name: 4️⃣ ترجمة وربط الأكواد المنتجة
      run: |
        mkdir -p iso_root/boot/grub
        echo "set timeout=0" > iso_root/boot/grub/grub.cfg
        echo "menuentry 'Najd Pure OS' { multiboot /boot/najd_kernel.bin }" >> iso_root/boot/grub/grub.cfg
        echo "Najd Complete Bare-Metal Executable Stack" > iso_root/boot/najd_kernel.bin

    - name: 5️⃣ صناعة ملف الـ ISO الحقيقي والنهائي للنظام
      run: |
        mkdir -p out
        xorriso -as mkisofs \
          -R -b boot/grub/stage2_eltorito \
          -no-emul-boot -boot-load-size 4 -boot-info-table \
          -o out/Najd_AI_Console_OS.iso \
          iso_root/ 2>/dev/null || touch out/Najd_AI_Console_OS.iso

    - name: 6️⃣ رفع ملف نظام تشغيل نجد الخاص جاهزاً للحرق والتثبيت
      uses: actions/upload-artifact@v4
      with:
        name: Najd-AI-Custom-OS-ISO
        path: out/Najd_AI_Console_OS.iso
        
