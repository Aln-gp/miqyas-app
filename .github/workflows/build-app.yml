name: Build Najd OS

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build Najd OS Solution
      # البناء باستخدام ملف الـ sln المضبوط مع تمرير سيرفرات الحزم مباشرة
      run: |
        dotnet restore NajdOS.sln --source "https://api.nuget.org/v3/index.json" --source "https://www.myget.org/F/cosmos/api/v3/index.json"
        dotnet build NajdOS.sln --configuration Release

    - name: Find and Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NajdOS-Complete-ISO
        path: |
          **/bin/Release/net8.0/*.iso
          **/*.iso
        if-no-files-found: error
        
