name: AI Build Agent
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - name: Clean and Build Miqyas App
      run: |
        rm -rf *
        flutter create miqyas_ecommerce_app
        
