name: Najd AI Multi-Platform Production Builder

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Najd AI Platform
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Java Environment
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter Framework
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'

    - name: Initialize Project Configurations & Dependencies
      run: |
        flutter pub get
        flutter pub add http flutter_tts || true

    - name: Build Android Deployment Package (APK)
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        FIREBASE_KEY: ${{ secrets.FIREBASE_ANDROID_API_KEY }}
      run: |
        flutter build apk --release \
          --dart-define=GEMINI_API_KEY="$GEMINI_KEY" \
          --dart-define=FIREBASE_API_KEY="$FIREBASE_KEY" \
          --dart-define=PACKAGE_NAME="com.Alnofaie.najdai"

    - name: Build iOS Deployment Package (Unsigned IPA)
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        FIREBASE_KEY: ${{ secrets.FIREBASE_IOS_API_KEY }}
      run: |
        flutter build ios --release --no-codesign \
          --dart-define=GEMINI_API_KEY="$GEMINI_KEY" \
          --dart-define=FIREBASE_API_KEY="$FIREBASE_KEY" \
          --dart-define=BUNDLE_ID="com.najd.ai"

    - name: Build macOS Desktop Application
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        FIREBASE_KEY: ${{ secrets.FIREBASE_IOS_API_KEY }}
      run: |
        flutter build macos --release \
          --dart-define=GEMINI_API_KEY="$GEMINI_KEY" \
          --dart-define=FIREBASE_API_KEY="$FIREBASE_KEY" \
          --dart-define=BUNDLE_ID="com.najd.ai.macos"

    - name: Build Web Platform Distribution
      env:
        GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        FIREBASE_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
      run: |
        flutter build web --release \
          --dart-define=GEMINI_API_KEY="$GEMINI_KEY" \
          --dart-define=FIREBASE_API_KEY="$FIREBASE_KEY"

    - name: Upload Android APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: najd-ai-android-build
        path: build/app/outputs/flutter-apk/app-release.apk

    - name: Upload iOS App Artifact
      uses: actions/upload-artifact@v4
      with:
        name: najd-ai-ios-build
        path: build/ios/iphoneos/

    - name: Upload macOS App Artifact
      uses: actions/upload-artifact@v4
      with:
        name: najd-ai-macos-build
        path: build/macos/Build/Products/Release/

    - name: Upload Web Artifact
      uses: actions/upload-artifact@v4
      with:
        name: najd-ai-web-build
        path: build/web/
        
