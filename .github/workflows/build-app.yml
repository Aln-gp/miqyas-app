name: Build Najd OS

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Restore and Build
      run: |
        dotnet restore NajdOS.sln
        dotnet build NajdOS.sln --configuration Release -v normal

    - name: Locate and Upload ISO
      run: |
        # البحث عن ملف الـ ISO في كل مكان
        $isoPath = Get-ChildItem -Path . -Filter *.iso -Recurse | Select-Object -First 1 -ExpandProperty FullName
        
        if ($isoPath) {
          echo "تم العثور على الملف في: $isoPath"
          echo "ISO_PATH=$isoPath" >> $env:GITHUB_ENV
        } else {
          echo "خطأ: لم يتم العثور على ملف ISO!"
          exit 1
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NajdOS-ISO
        path: ${{ env.GITHUB_ENV.ISO_PATH }}
        if-no-files-found: error
        
