name: Build Najd OS

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # تم حذف أمر الإضافة اليدوية لتجنب تعارض الأسماء
    - name: Install Cosmos Build Tools
      run: |
        dotnet tool install -g Cosmos.Build

    - name: Build Najd OS
      run: |
        dotnet build NajdOS.sln --configuration Release

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: NajdOS-ISO
        path: NajdOS/bin/Release/net8.0/NajdOS.iso
