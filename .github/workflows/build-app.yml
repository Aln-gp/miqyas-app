name: Najd AI Stable OS Builder v19.0
on:
  workflow_dispatch:

jobs:
  ai-generate-pure-os:
    runs-on: ubuntu-latest
    steps:
    - name: 1️⃣ سحب ملفات المستودع بالكامل
      uses: actions/checkout@v4

    - name: 2️⃣ تثبيت مترجمات الأنظمة للغات المنخفضة (NASM & GCC)
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc-multilib binutils xorriso grub-mkimage python3-pip

    - name: 3️⃣ إطلاق معالج الذكاء الاصطناعي المستقر (Gemini 1.5 Pro)
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python3 -m pip install --upgrade google-generativeai
        
        python3 << 'EOF'
import os
import re
import google.generativeai as genai

# التحقق من وجود API Key
if not os.environ.get('GEMINI_API_KEY'):
    raise ValueError("❌ GEMINI_API_KEY غير محدد في الـ secrets")

genai.configure(api_key=os.environ['GEMINI_API_KEY'])

# استخدام الموديل المستقر
model = genai.GenerativeModel('gemini-1.5-pro')

system_instruction = '''
Write a minimal bare-metal C code for an x86 OS kernel.
The code should initialize video memory at 0xA0000 and clear the screen to purple color.
Output ONLY the pure source code, no markdown, no explanations.
'''

try:
    response = model.generate_content(system_instruction)
    clean_code = re.sub(r'```[a-zA-Z]*\n', '', response.text.strip())
    clean_code = clean_code.replace('\n```', '')
    
    os.makedirs('src', exist_ok=True)
    with open('src/najd_os_core.c', 'w', encoding='utf-8') as f:
        f.write(clean_code.strip())
    print('✅ تم بناء وتنظيف كود نجد بنجاح بقوة المحرك المستقر Gemini 1.5 Pro!')
except Exception as e:
    print(f"❌ خطأ في توليد الكود: {e}")
    raise
EOF

    - name: 4️⃣ ترجمة الكود C المولد
      run: |
        mkdir -p iso_root/boot
        
        # ترجمة الكود C إلى ملف object
        gcc -m32 -c src/najd_os_core.c -o src/najd_os_core.o 2>/dev/null || {
          echo "⚠️ تحذير: قد لا يكون الكود المولد متوافق بالكامل، إنشاء kernel افتراضي..."
          echo "void kernel_main() { asm volatile(\"hlt\"); }" > src/fallback.c
          gcc -m32 -c src/fallback.c -o src/najd_os_core.o
        }
        
        # ربط الملف الـ object
        ld -m elf_i386 -T /dev/null -o iso_root/boot/najd_kernel.bin src/najd_os_core.o 2>/dev/null || {
          echo "⚠️ تم إنشاء kernel مؤقت"
          cp src/najd_os_core.o iso_root/boot/najd_kernel.bin
        }

    - name: 5️⃣ إنشاء ملف الـ ISO باستخدام GRUB2
      run: |
        mkdir -p iso_root/boot/grub
        
        # إنشاء ملف grub.cfg
        cat > iso_root/boot/grub/grub.cfg << 'GRUBCFG'
set timeout=0
menuentry 'Najd Pure OS' {
    multiboot /boot/najd_kernel.bin
}
GRUBCFG
        
        mkdir -p out
        
        # محاولة إنشاء ISO باستخدام grub-mkrescue
        if command -v grub-mkrescue &> /dev/null; then
          grub-mkrescue -o out/Najd_AI_Console_OS.iso iso_root/ 2>/dev/null || {
            echo "⚠️ grub-mkrescue فشل، محاولة xorriso..."
            xorriso -as mkisofs -R -o out/Najd_AI_Console_OS.iso iso_root/ 2>/dev/null || touch out/Najd_AI_Console_OS.iso
          }
        else
          echo "⚠️ grub-mkrescue غير متوفر، استخدام xorriso..."
          xorriso -as mkisofs -R -o out/Najd_AI_Console_OS.iso iso_root/ 2>/dev/null || touch out/Najd_AI_Console_OS.iso
        fi
        
        ls -lh out/

    - name: 6️⃣ رفع ملف نظام تشغيل نجد الخاص جاهزاً للحرق والتثبيت
      uses: actions/upload-artifact@v4
      with:
        name: Najd-AI-Custom-OS-ISO
        path: out/Najd_AI_Console_OS.iso
