name: Najd AI Ultimate Full Platform Builder

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Najd AI Full Ecosystem
    runs-on: macos-latest

    steps:
    - name: Run actions/checkout@v3
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.x'
        channel: 'stable'

    - name: Create and Code Miqyas App
      run: |
        flutter create --platforms=android,ios,macos,web --project-name=miqyas_app .
        flutter pub get
        flutter pub add http || true
        mkdir -p lib
        rm -f lib/main.dart
        
        echo "import 'dart:convert';" >> lib/main.dart
        echo "import 'package:flutter/material.dart';" >> lib/main.dart
        echo "import 'package:http/http.dart' as http;" >> lib/main.dart
        echo "void main() { runApp(const NajdAIApp()); }" >> lib/main.dart
        echo "class NajdAIApp extends StatelessWidget {" >> lib/main.dart
        echo "  const NajdAIApp({Key? key}) : super(key: key);" >> lib/main.dart
        echo "  @override" >> lib/main.dart
        echo "  Widget build(BuildContext context) {" >> lib/main.dart
        echo "    return MaterialApp(" >> lib/main.dart
        echo "      title: 'Najd AI'," >> lib/main.dart
        echo "      debugShowCheckedModeBanner: false," >> lib/main.dart
        echo "      theme: ThemeData.dark().copyWith(scaffoldBackgroundColor: const Color(0xFF0F0F10))," >> lib/main.dart
        echo "      home: const AuthScreen()," >> lib/main.dart
        echo "    );" >> lib/main.dart
        echo "  }" >> lib/main.dart
        echo "}" >> lib/main.dart
        echo "class AuthScreen extends StatefulWidget {" >> lib/main.dart
        echo "  const AuthScreen({Key? key}) : super(key: key);" >> lib/main.dart
        echo "  @override" >> lib/main.dart
        echo "  State<AuthScreen> createState() => _AuthScreenState();" >> lib/main.dart
        echo "}" >> lib/main.dart
        echo "class _AuthScreenState extends State<AuthScreen> {" >> lib/main.dart
        echo "  final _email = TextEditingController();" >> lib/main.dart
        echo "  final _pass = TextEditingController();" >> lib/main.dart
        echo "  final String firebaseKey = String.fromEnvironment('FIREBASE_API_KEY');" >> lib/main.dart
        echo "  final String geminiKey = String.fromEnvironment('GEMINI_API_KEY');" >> lib/main.dart
        echo "  void _go() { Navigator.pushReplacement(context, MaterialPageRoute(builder: (c) => MainDashboard(geminiKey: geminiKey))); }" >> lib/main.dart
        echo "  @override" >> lib/main.dart
        echo "  Widget build(BuildContext context) {" >> lib/main.dart
        echo "    return Scaffold(" >> lib/main.dart
        echo "      body: Center(" >> lib/main.dart
        echo "        child: Padding(" >> lib/main.dart
        echo "          padding: const EdgeInsets.all(24.0)," >> lib/main.dart
        echo "          child: Column(" >> lib/main.dart
        echo "            mainAxisAlignment: MainAxisAlignment.center," >> lib/main.dart
        echo "            children: [" >> lib/main.dart
        echo "              const Icon(Icons.psychology, size: 70, color: Color(0xFF2F80ED))," >> lib/main.dart
        echo "              const SizedBox(height: 10)," >> lib/main.dart
        echo "              const Text('🤖 منصة نجد AI', style: TextStyle(fontSize: 32, fontWeight: FontWeight.bold))," >> lib/main.dart
        echo "              const Text('بواسطة يزن النفيعي', style: TextStyle(color: Colors.grey))," >> lib/main.dart
        echo "              const SizedBox(height: 30)," >> lib/main.dart
        echo "              TextField(controller: _email, decoration: const InputDecoration(labelText: 'البريد الإلكتروني', filled: true))," >> lib/main.dart
        echo "              const SizedBox(height: 15)," >> lib/main.dart
        echo "              TextField(controller: _pass, obscureText: true, decoration: const InputDecoration(labelText: 'كلمة المرور', filled: true))," >> lib/main.dart
        echo "              const SizedBox(height: 25)," >> lib/main.dart
        echo "              ElevatedButton(style: ElevatedButton.styleFrom(minimumSize: const Size.fromHeight(50)), onPressed: _go, child: const Text('دخول مباشر'))," >> lib/main.dart
        echo "            ]," >> lib/main.dart
        echo "          )," >> lib/main.dart
        echo "        )," >> lib/main.dart
        echo "      )," >> lib/main.dart
        echo "    );" >> lib/main.dart
        echo "  }" >> lib/main.dart
        echo "}" >> lib/main.dart
        echo "class MainDashboard extends StatefulWidget {" >> lib/main.dart
        echo "  final String geminiKey;" >> lib/main.dart
        echo "  const MainDashboard({Key? key, required this.geminiKey}) : super(key: key);" >> lib/main.dart
        echo "  @override" >> lib/main.dart
        echo "  State<MainDashboard> createState() => _MainDashboardState();" >> lib/main.dart
        echo "}" >> lib/main.dart
        echo "class _MainDashboardState extends State<MainDashboard> {" >> lib/main.dart
        echo "  final _controller = TextEditingController();" >> lib/main.dart
        echo "  final List<String> _chats = [];" >> lib/main.dart
        echo "  bool _loading = false;" >> lib/main.dart
        echo "  Future<void> _send(String t) async {" >> lib/main.dart
        echo "    if (t.trim().isEmpty) return;" >> lib/main.dart
        echo "    setState(() { _chats.add('أنت: \$t'); _loading = true; });" >> lib/main.dart
        echo "    _controller.clear();" >> lib/main.dart
        echo "    final url = Uri.parse('https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=\${widget.geminiKey}');" >> lib/main.dart
        echo "    try {" >> lib/main.dart
        echo "      final res = await http.post(url, headers: {'Content-Type': 'application/json'}, body: jsonEncode({'contents': [{'parts': [{'text': 'أنت نجد AI من تطوير المبرمج يزن النفيعي من الطائف. أجب باختصار واعتزاز بمشاريع يزن مثل Black-link OS و BeAna Sport OS. السؤال: ' + t}]}]}));" >> lib/main.dart
        echo "      if (res.statusCode == 200) {" >> lib/main.dart
        echo "        var d = jsonDecode(res.body);" >> lib/main.dart
        echo "        setState(() { _chats.add('نجد AI: ' + d['candidates'][0]['content']['parts'][0]['text']); });" >> lib/main.dart
        echo "      }" >> lib/main.dart
        echo "    } catch (e) {" >> lib/main.dart
        echo "      setState(() { _chats.add('❌ خطأ في الاتصال بنجد AI'); });" >> lib/main.dart
        echo "    } finally {" >> lib/main.dart
        echo "      setState(() { _loading = false; });" >> lib/main.dart
        echo "    }" >> lib/main.dart
        echo "  }" >> lib/main.dart
        echo "  @override" >> lib/main.dart
        echo "  Widget build(BuildContext context) {" >> lib/main.dart
        echo "    return Scaffold(" >> lib/main.dart
        echo "      appBar: AppBar(title: const Text('🤖 نجد AI - اللوحة الذكية'))," >> lib/main.dart
        echo "      body: Column(" >> lib/main.dart
        echo "        children: [" >> lib/main.dart
        echo "          Expanded(child: ListView.builder(itemCount: _chats.length, itemBuilder: (c, i) => ListTile(title: Text(_chats[i]))))," >> lib/main.dart
        echo "          if (_loading) const LinearProgressIndicator()," >> lib/main.dart
        echo "          Container(" >> lib/main.dart
        echo "            padding: const EdgeInsets.all(8)," >> lib/main.dart
        echo "            child: Row(" >> lib/main.dart
        echo "              children: [" >> lib/main.dart
        echo "                Expanded(child: TextField(controller: _controller, decoration: const InputDecoration(hintText: 'اسأل نجد AI...')))," >> lib/main.dart
        echo "                IconButton(icon: const Icon(Icons.send), onPressed: () => _send(_controller.text))," >> lib/main.dart
        echo "              ]," >> lib/main.dart
        echo "            )," >> lib/main.dart
        echo "          )" >> lib/main.dart
        echo "        ]," >> lib/main.dart
        echo "      )," >> lib/main.dart
        echo "    );" >> lib/main.dart
        echo "  }" >> lib/main.dart
        echo "}" >> lib/main.dart

    - name: Build Android APK
      run: flutter build apk --release --dart-define=FIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}" --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"

    - name: Build iOS IPA (Unsigned)
      run: flutter build ios --release --no-codesign --dart-define=FIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}" --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"

    - name: Build macOS App
      run: flutter build macos --release --dart-define=FIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}" --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"

    - name: Build Web Platform
      run: flutter build web --release --dart-define=FIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}" --dart-define=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: najd-android-apk
        path: build/app/outputs/flutter-apk/app-release.apk

    - name: Upload iOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: najd-ios-ipa
        path: build/ios/iphoneos/

    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: najd-macos-app
        path: build/macos/Build/Products/Release/

    - name: Upload Web Artifact
      uses: actions/upload-artifact@v4
      with:
        name: najd-web-platform
        path: build/web/
        
