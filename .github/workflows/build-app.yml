name: AI Build Agent
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
    - name: Create App in Subfolder
      run: |
        mkdir -p miqyas_store
        cd miqyas_store
        flutter create --project-name=miqyas_app .
    - name: Push Files to Repository
      run: |
        git config --global user.name "Aln-gp"
        git config --global user.email "alnofaie.gp@gmail.com"
        git add .
        git commit -m "تأسيس مجلد متجر مقياس الرسمي" || echo "No changes"
        git push origin main || echo "No push"
        
