name: Build Najd OS Integrated System

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        # هنا الحل: نسجل خادم الحزم لـ Cosmos كخادم رسمي داخل الـ Runner نفسه أثناء التثبيت
        source-url: https://www.myget.org/F/cosmos/api/v3/index.json

    - name: Clear Cache and Force Restore
      run: |
        dotnet nuget locals all --clear
        cd NajdOS
        # نأمر الـ Restore بتجاهل أي ملفات إعدادات قديمة في المستودع والاعتماد على السيرفر فقط
        dotnet restore NajdOS.csproj --no-cache --force

    - name: Compile and Build New ISO
      run: |
        cd NajdOS
        # بناء النظام الجديد كاملاً مع الواجهة والملفات وحفظ الـ ISO في مجلد محدد
        dotnet build NajdOS.csproj --configuration Release --output ../NajdOS_Builds/

    - name: Upload Integrated ISO
      uses: actions/upload-artifact@v4
      with:
        name: NajdOS-Complete-ISO
        path: NajdOS_Builds/
        if-no-files-found: error
        
