name: Build CarPlay Browser App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Compile and Bundle IPA
      run: |
        SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
        
        rm -rf Payload CarPlayFinal.ipa
        
        # بناء ملفات السويفت مجتمعة
        swiftc -target arm64-apple-ios15.0 \
          -sdk "$SDK_PATH" \
          -O \
          *.swift \
          -framework SwiftUI \
          -framework CarPlay \
          -framework WebKit \
          -module-name CarPlayHub \
          -o CarPlayHubExecutable
          
        mkdir -p Payload/CarPlayHub.app
        mv CarPlayHubExecutable Payload/CarPlayHub.app/CarPlayHub
        
        # توليد ملف Info.plist يدعم البث الصوتي لتخطي قفل الشهادات المجانية العامة
        cat <<EOF > Payload/CarPlayHub.app/Info.plist
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleIdentifier</key>
            <string>com.yazan.carplay.freecert</string>
            <key>CFBundleName</key>
            <string>YazanWeb</string>
            <key>CFBundleExecutable</key>
            <string>CarPlayHub</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>MinimumOSVersion</key>
            <string>15.0</string>
            <key>UIBackgroundModes</key>
            <array>
                <string>audio</string>
            </array>
            <key>UIApplicationSceneManifest</key>
            <dict>
                <key>UIApplicationSupportsMultipleScenes</key>
                <true/>
                <key>UISceneConfigurations</key>
                <dict>
                    <key>CPTemplateApplicationSceneSessionRoleApplication</key>
                    <array>
                        <dict>
                            <key>UISceneConfigurationName</key>
                            <string>CarPlay</string>
                            <key>UISceneDelegateClassName</key>
                            <string>CarPlayHub.CarPlaySceneDelegate</string>
                        </dict>
                    </array>
                </dict>
            </dict>
        </dict>
        </plist>
        EOF
        
        zip -r CarPlayFinal.ipa Payload
        
    - name: Upload Finished IPA
      uses: actions/upload-artifact@v4
      with:
        name: CarPlay-Free-Browser
        path: CarPlayFinal.ipa
        
